name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.0"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target: aarch64-apple-darwin
            archive: clashtui-macos-arm64
          - name: Linux amd64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: clashtui-linux-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Test
        run: cargo test --workspace --locked

      - name: Download mihomo for embedding
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            aarch64-apple-darwin) infix="darwin-arm64" ;;
            x86_64-unknown-linux-gnu) infix="linux-amd64" ;;
            *) echo "unsupported target ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          tag="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | ruby -rjson -e 'puts JSON.parse(STDIN.read).fetch("tag_name")')"
          asset="mihomo-${infix}-${tag}.gz"
          url="https://github.com/MetaCubeX/mihomo/releases/download/${tag}/${asset}"
          mkdir -p embedded
          curl -fL "$url" | gunzip > embedded/mihomo
          chmod +x embedded/mihomo

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bin clashtui
        env:
          CLASHTUI_EMBED_MIHOMO_PATH: ${{ github.workspace }}/embedded/mihomo

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.archive }}"
          cp "target/${{ matrix.target }}/release/clashtui" "dist/${{ matrix.archive }}/"
          cp README.md "dist/${{ matrix.archive }}/"
          cp docs/DEVELOPMENT.md "dist/${{ matrix.archive }}/DEVELOPMENT.md"
          tar -C dist -czf "dist/${{ matrix.archive }}.tar.gz" "${{ matrix.archive }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}.tar.gz
          if-no-files-found: error

  build-ubuntu-20-04:
    name: Linux amd64 (Ubuntu 20.04 compatible)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Build Ubuntu 20.04 compatible binary
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | ruby -rjson -e 'puts JSON.parse(STDIN.read).fetch("tag_name")')"
          asset="mihomo-linux-amd64-${tag}.gz"
          url="https://github.com/MetaCubeX/mihomo/releases/download/${tag}/${asset}"
          mkdir -p embedded
          curl -fL "$url" | gunzip > embedded/mihomo
          chmod +x embedded/mihomo
          CLASHTUI_EMBED_MIHOMO_PATH="$PWD/embedded/mihomo" \
            cargo build --release --locked --target x86_64-unknown-linux-musl --bin clashtui

      - name: Package Ubuntu 20.04 artifact
        shell: bash
        run: |
          set -euo pipefail
          archive="clashtui-linux-amd64-ubuntu20.04"
          mkdir -p "dist/${archive}"
          cp "target/x86_64-unknown-linux-musl/release/clashtui" "dist/${archive}/"
          cp README.md "dist/${archive}/"
          cp docs/DEVELOPMENT.md "dist/${archive}/DEVELOPMENT.md"
          tar -C dist -czf "dist/${archive}.tar.gz" "${archive}"

      - name: Upload Ubuntu 20.04 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clashtui-linux-amd64-ubuntu20.04
          path: dist/clashtui-linux-amd64-ubuntu20.04.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
      - build-ubuntu-20-04
    runs-on: ubuntu-24.04
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find dist -maxdepth 1 -type f -name '*.tar.gz' | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found in dist" >&2
            find dist -maxdepth 2 -type f -print >&2 || true
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" --verify-tag --title "$TAG" --notes "ClashTUI $TAG"
            gh release upload "$TAG" "${assets[@]}" --clobber
          fi

name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.0"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target: aarch64-apple-darwin
            archive: clashtui-macos-arm64
          - name: Linux amd64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: clashtui-linux-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Test
        run: cargo test --workspace --locked

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bin clashtui

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.archive }}"
          cp "target/${{ matrix.target }}/release/clashtui" "dist/${{ matrix.archive }}/"
          cp README.md "dist/${{ matrix.archive }}/"
          cp docs/DEVELOPMENT.md "dist/${{ matrix.archive }}/DEVELOPMENT.md"
          tar -C dist -czf "dist/${{ matrix.archive }}.tar.gz" "${{ matrix.archive }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}.tar.gz
          if-no-files-found: error

  build-ubuntu-20-04:
    name: Linux amd64 (Ubuntu 20.04)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test and build in Ubuntu 20.04
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -e RUST_VERSION="${RUST_VERSION}" \
            -v "$PWD:/work" \
            -w /work \
            ubuntu:20.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates \
                curl \
                build-essential \
                pkg-config \
                git
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain "$RUST_VERSION"
              . "$HOME/.cargo/env"
              cargo test --workspace --locked
              cargo build --release --locked --target x86_64-unknown-linux-gnu --bin clashtui
            '

      - name: Package Ubuntu 20.04 artifact
        shell: bash
        run: |
          set -euo pipefail
          archive="clashtui-linux-amd64-ubuntu20.04"
          mkdir -p "dist/${archive}"
          cp "target/x86_64-unknown-linux-gnu/release/clashtui" "dist/${archive}/"
          cp README.md "dist/${archive}/"
          cp docs/DEVELOPMENT.md "dist/${archive}/DEVELOPMENT.md"
          tar -C dist -czf "dist/${archive}.tar.gz" "${archive}"

      - name: Upload Ubuntu 20.04 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clashtui-linux-amd64-ubuntu20.04
          path: dist/clashtui-linux-amd64-ubuntu20.04.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
      - build-ubuntu-20-04
    runs-on: ubuntu-24.04
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.tar.gz --clobber
          else
            gh release create "$TAG" dist/*.tar.gz --title "$TAG" --notes "ClashTUI $TAG"
          fi
